<body>

  <div class="page-container">

          <a href="resume.html">Resume</a>
          <a href="work.html">Work</a>
          <a href="contact.html" class="active">Contact</a>
        </nav>
      </div>

      <div class="content-contact">

        <div class="contact-text">
          <h2>
            WANT<br>
            TO GET<br>
            IN TOUCH ?
          </h2>
        </div>

        <div class="contact-form-box">
          <form class="contact-form" action="#" method="post">

            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Your email" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" placeholder="Write your message here" required></textarea>

            <button type="submit">Send</button>

          </form>
        </div>

      </div>

    
      <div class="footer">
        <a href="mailto:brommala@msu.edu">
          <img src="images/email1.png" alt="Email Icon" class="icon">
        </a>

        <a href="tel:248-812-6165">
          <img src="images/phone1.png" alt="Phone Icon" class="icon">
        </a>

        <a href="https://www.linkedin.com/in/alanna-bromm-4a91703a3/" target="_blank">
          <img src="images/linkedin.png" alt="LinkedIn Icon" class="icon">
        </a>
      </div>

    </div>
  </div>
